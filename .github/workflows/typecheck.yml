name: Typecheck

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Verificar que cada spec tenga acceptance.md
        run: |
          for spec_dir in specs/*/; do
            if [ ! -f "${spec_dir}acceptance.md" ]; then
              echo "❌ Falta acceptance.md en ${spec_dir}"
              exit 1
            fi
          done
          echo "✓ Todos los specs tienen acceptance.md"
